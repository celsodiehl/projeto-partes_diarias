<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://xmlns.jcp.org/jsf/core"
	xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
	xmlns:p="http://primefaces.org/ui">
	
	<ui:composition template="estrutura.xhtml">
	
		<ui:define name="titulo">Cadastro de Partes Diárias</ui:define>
		<h1>Cadastro de Partes Diárias</h1>
		
<!-- BARRA DE IMPRIMIR -->
<h:form id="formRelatorio">

    <div class="card">

        <p:toolbar style="margin-top:20px">

            <!-- FILTROS (ESQUERDA) -->
            <p:toolbarGroup align="left">

                <p:outputLabel value="Contrato" style="margin-left:10px"/>
                <p:selectOneMenu value="#{parteDiariaBean.ptdia.contrato}"
                                 converter="contratoConverter" required="true" style="width:240px">

                    <f:selectItem itemLabel="Selecione um Contrato" noSelectionOption="true"/>
                    <f:selectItems value="#{parteDiariaBean.contratos}" var="e" itemLabel="#{e.nome}" itemValue="#{e}"/>

                    <p:ajax listener="#{parteDiariaBean.carregarVeiculos}" update="veiculo" resetValues="true"/>
                </p:selectOneMenu>

                <p:outputLabel value="Veiculo" style="margin-left:10px"/>
                <p:selectOneMenu id="veiculo" value="#{parteDiariaBean.ptdia.veiculo}"
                                 converter="veiculoConverter" required="true" style="width:240px">

                    <f:selectItem itemLabel="Selecione um Veiculo" noSelectionOption="true"/>
                    <f:selectItems value="#{parteDiariaBean.veiculos}"
                                   var="e" itemLabel="#{e.placa}" itemValue="#{e}"/>
                </p:selectOneMenu>

                <p:outputLabel for="datainicio" value="Inicio" style="margin-left:10px"/>
                <p:datePicker id="datainicio" value="#{parteDiariaBean.dataInicio}"
                              pattern="dd/MM/yyyy" showIcon="true" required="true"/>
                              
                 <p:outputLabel for="datafim" value="Fim" style="margin-left:10px"/>
                <p:datePicker id="datafim" value="#{parteDiariaBean.dataFim}"
                              pattern="dd/MM/yyyy" showIcon="true" required="true"/>

            </p:toolbarGroup>

            <!-- BOTÃO (DIREITA) -->
            <p:toolbarGroup>
            
				<p:commandButton value="Imprimir" icon="pi pi-print" styleClass="mr-2" action="#{parteDiariaBean.imprimirRelatorio}" process="@form" ajax="false" onclick="this.form.target = '_blank';" />

            </p:toolbarGroup>

        </p:toolbar>

    </div>

</h:form>
		
<h:form id="formCadastro">

		<p:messages id="messages" closable="true" />

<!-- FORMULARIO DE CADASTRO-->
<!-- 1ª Linha -->
<div class="formgrid grid align-items-end">

    <!-- Nome Obra -->
    <div class="field col-12 md:col-3">
        <p:outputLabel value="Nome Obra" />
        <p:selectOneMenu value="#{parteDiariaBean.ptdia.obra}" converter="obraConverter" required="true" style="width:100%">
        
            <f:selectItem itemLabel="Selecione a Obra" noSelectionOption="true"/>
            <f:selectItems value="#{parteDiariaBean.obras}" var="e" itemLabel="#{e.nome}" itemValue="#{e}" />
            <p:ajax update="cidade contratante"/>
            
        </p:selectOneMenu>
    </div>

    <!-- Cidade -->
    <div class="field col-12 md:col-3">
        <p:outputLabel value="Cidade" />
        <p:inputText id="cidade" value="#{parteDiariaBean.ptdia.obra.cidade}"
                     readonly="true" style="width:100%"/>
    </div>

    <!-- Contratante -->
    <div class="field col-12 md:col-3">
        <p:outputLabel value="Contratante" />
        <p:inputText id="contratante" value="#{parteDiariaBean.ptdia.obra.contratante.nome}"
                     readonly="true" style="width:100%"/>
    </div>

</div>

<!-- 2ª Linha -->
<div class="formgrid grid">

    <div class="field col-12 md:col-2">
        <p:outputLabel value="Contrato" />
        
        <p:selectOneMenu value="#{parteDiariaBean.ptdia.contrato}" converter="contratoConverter" required="true" style="width:100%">
        
            <f:selectItem itemLabel="Selecione um Contrato" noSelectionOption="true"/>
            <f:selectItems value="#{parteDiariaBean.contratos}" var="e" itemLabel="#{e.nome}" itemValue="#{e}" />
            <p:ajax listener="#{parteDiariaBean.carregarVeiculos}" update="veiculo valor painelValor"/>
            
        </p:selectOneMenu>
    </div>

    <div class="field col-12 md:col-2">
        <p:outputLabel value="Veículo" />
        <p:selectOneMenu id="veiculo" value="#{parteDiariaBean.ptdia.veiculo}"
                         converter="veiculoConverter" required="true" style="width:100%">
                         
            <f:selectItem itemLabel="Selecione um Veículo" noSelectionOption="true"/>
            <f:selectItems value="#{parteDiariaBean.veiculos}" var="e" itemLabel="#{e.placa}" itemValue="#{e}" />
               <p:ajax update="motorista" />
        </p:selectOneMenu>
    </div>

    <div class="field col-12 md:col-2">
        <p:outputLabel value="Motorista" />
        <p:inputText id="motorista" value="#{parteDiariaBean.ptdia.veiculo.motorista.nome}"
                     readonly="true" style="width:100%"/>
    </div>

<div class="field col-12 md:col-2">

    <p:outputPanel id="painelValor">

        <p:outputLabel for="valor"
            rendered="#{not empty parteDiariaBean.ptdia.contrato.tipocontrato}"
            value="Valor #{parteDiariaBean.ptdia.contrato.tipocontrato == 'DIARIA' ? 'da Diária' : 'Mensal'}" />

        <p:inputNumber id="valor"
            rendered="#{not empty parteDiariaBean.ptdia.contrato.tipocontrato}"
            value="#{parteDiariaBean.ptdia.contrato.valor}"
            decimalPlaces="2" required="true" style="width:100%" readonly="true"/>

    </p:outputPanel>

</div>

    <div class="field col-12 md:col-2">
        <p:outputLabel value="Data" />
        <p:datePicker value="#{parteDiariaBean.ptdia.data}"
                      pattern="dd/MM/yyyy" showIcon="true" required="true" style="width:100%"/>
    </div>

</div>

<!-- 3ª Linha -->
<div class="grid">

    <div class="col-12 md:col-6">
        <p:fieldset legend="Dados de HORAS">

            <div class="formgrid grid">
                <div class="field col-6">
                    <p:outputLabel value="Hora inicial"/>
                    <p:datePicker value="#{parteDiariaBean.ptdia.horaInicio}"
                                  timeOnly="true" pattern="HH:mm" style="width:100%"/>
                </div>

                <div class="field col-6">
                    <p:outputLabel value="Hora final"/>
                    <p:datePicker value="#{parteDiariaBean.ptdia.horaFim}"
                                  timeOnly="true" pattern="HH:mm" style="width:100%"/>
                </div>
            </div>

        </p:fieldset>
    </div>

    <div class="col-12 md:col-6">
        <p:fieldset legend="Dados de KM">

            <div class="formgrid grid">
                <div class="field col-6">
                    <p:outputLabel value="Odômetro Inicial"/>
                    <p:inputText value="#{parteDiariaBean.ptdia.odomInicio}" style="width:100%"/>
                </div>

                <div class="field col-6">
                    <p:outputLabel value="Odômetro Final"/>
                    <p:inputText value="#{parteDiariaBean.ptdia.odomFim}" style="width:100%"/>
                </div>
            </div>

        </p:fieldset>
    </div>

</div>

<!-- Serviço e Oservação -->
<div class="formgrid grid">

    <div class="field col-12 md:col-6">
        <p:outputLabel value="Serviço"/>
        <p:selectOneMenu value="#{parteDiariaBean.ptdia.servico}"
                         converter="servicoConverter" required="true" style="width:100%">
            <f:selectItem itemLabel="Selecione o Tipo de Serviço" noSelectionOption="true"/>
            <f:selectItems value="#{parteDiariaBean.servicos}" var="e"
                           itemLabel="#{e.nome}" itemValue="#{e}" />
        </p:selectOneMenu>
    </div>

    <div class="field col-12 md:col-6">
        <p:outputLabel value="Observações"/>
        <p:inputTextarea value="#{parteDiariaBean.ptdia.observacao}"
                         rows="4" style="width:100%"
                         placeholder="Descreva algum comentário aqui..."/>
    </div>

</div>
		
		<div class="card">

			<p:toolbar style="margin-top: 20px">

				<p:toolbarGroup>
					<p:commandButton id="salvarBtn" value="Salvar" icon="pi pi-save" styleClass="ui-button-success"	action="#{parteDiariaBean.adicionar}" update=":formCadastro:messages :formCadastro" />
				</p:toolbarGroup>

				<p:toolbarGroup align="right">
					<p:button icon="pi pi-search" value="Pesquisar"	styleClass="ui-button-warning" />
				</p:toolbarGroup>
			</p:toolbar>

		</div>

	</h:form>
	
	</ui:composition>

</html>
