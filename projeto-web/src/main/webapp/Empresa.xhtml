<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://xmlns.jcp.org/jsf/core"
	xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
	xmlns:p="http://primefaces.org/ui">
	
	<ui:composition template="estrutura.xhtml">
	
		<ui:define name="titulo">Cadastro de Empresa</ui:define>
		<h1>Cadastro de Empresa</h1>
		
	<h:form id="formCadastro">

		<p:panel style="margin-top: 10px">
			<p:messages autoUpdate="true" />

			<div class="ui-fluid">
				<p:panelGrid columns="2" layout="grid" columnClasses="ui-grid-col-2, ui-grid-col-10" style="margin-top: 20px">

					<p:outputLabel value="Nome" />
					<p:inputText size="30" value="#{empresaBean.empresa.nome}" required="true" label="Nome" />
					
					<p:outputLabel value="CNPJ" />
					<p:inputMask mask="99.999.999.9999-99" value="#{empresaBean.empresa.cnpj}" required="true" label="CNPJ"/>
					
					<p:outputLabel value="Razão Social" />
					<p:inputText size="30" value="#{empresaBean.empresa.razaosocial}" required="true" label="Razao" />
					
					<p:outputLabel value="Inscrição Estadual" />
					<p:inputText size="30" value="#{empresaBean.empresa.inscricao}" required="true" label="Inscrição" />
					
					<p:outputLabel value="Endereço" />
					<p:inputText size="30" value="#{empresaBean.empresa.endereco}" required="true" label="Endereço" />
					
					<p:outputLabel value="Responsável" />
					<p:inputText size="30" value="#{empresaBean.empresa.responsavel}" required="true" label="Responsável" />

					<p:outputLabel />
					<p:commandButton id="salvarBtn" value="Salvar" icon="pi pi-save" styleClass="ui-button-success"	action="#{empresaBean.adicionar}" update=":formCadastro:messages :formCadastro" style="margin-top: 10px; width: 290px; height: 40px;" />

				</p:panelGrid>

			</div>

		</p:panel>
		
	</h:form>
	
	<!-- DATATABLE COM EMPRESA -->
	<h:form>
		<p:dataTable value="#{empresaBean.empresas}" var="obj" id="tabela" paginator="true" rows="5" responsiveLayout="scroll">
			
			<p:column headerText="Empresa">
				<p:outputLabel value="#{obj.nome}" />
			</p:column>
			
			<p:column headerText="CNPJ">
				<p:outputLabel value="#{obj.cnpj}" />
			</p:column>
			
			<p:column headerText="Ações" width="500">
				<p:commandButton icon="pi pi-pencil" styleClass="p-button-rounded p-button-info mr-2" update=":formDialog" oncomplete="PF('dlgEditar').show()"  style="margin-top: 10px; margin-right:10px;" width="100" >
					<f:setPropertyActionListener value="#{obj}" target="#{empresaBean.empresa}" />
				</p:commandButton>
				
				<p:commandButton action="#{empresaBean.excluir}" icon="pi pi-trash" update="tabela" process="@this" width="100">
					<f:setPropertyActionListener value="#{obj}" target="#{empresaBean.empresa}"/>
				</p:commandButton>
			</p:column>
			
		</p:dataTable>
	</h:form>
	
	<!-- DIALOG DE EDIÇÃO-->
	<p:dialog header="Editar Empresa" widgetVar="dlgEditar" modal="true" closable="true" resizable="false" styleClass="ui-fluid" width="450">

    	<h:form id="formDialog">

			<div class="field">
        		<p:outputLabel value="Nome" />
        		<p:inputText value="#{empresaBean.empresa.nome}" />
        	</div>
        	
			<div class="field">
        		<p:outputLabel value="CNPJ" />
        		<p:inputText value="#{empresaBean.empresa.cnpj}" />
        	</div>
					
        <br/><br/>
        <p:commandButton value="Salvar" action="#{empresaBean.adicionar}" update=":formCadastro :tabela" oncomplete="PF('dlgEditar').hide()" />

    	</h:form>

	</p:dialog>
	
	</ui:composition>

</html>
